<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kumar Website</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            font-family: Arial, sans-serif;
            color: gold;
        }

        header {
            text-align: center;
            padding: 50px;
            background: linear-gradient(90deg, black, #1a1a1a);
            border-bottom: 2px solid gold;
        }

        header h1 {
            font-size: 50px;
            margin: 0;
            letter-spacing: 3px;
        }

        nav {
            text-align: center;
            padding: 15px;
            border-bottom: 1px solid gold;
        }

        nav a {
            color: gold;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
        }

        nav a:hover {
            color: white;
        }

        section {
            padding: 50px;
            text-align: center;
        }

        .card {
            background: #111;
            border: 1px solid gold;
            padding: 20px;
            margin: 20px auto;
            width: 60%;
            border-radius: 10px;
            box-shadow: 0 0 10px gold;
        }

        footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid gold;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<header>
    <h1>KUMAR</h1>
    <p>Welcome to my website</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<section>
    <div class="card">
        <h2>About Me</h2>
        <p>Hello! My name is Kumar. This is my black and gold themed website.</p>
    </div>

    <div class="card">
        <h2>My Work</h2>
        <p>I create simple and stylish web designs.</p>
    </div>
</section>

<footer>
    <p>© 2026 Kumar | All Rights Reserved</p>
</footer>

</body>
</html>
